server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve static files, fall back to .html extension, then 404
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Long-term cache for hashed/immutable static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/html
        application/javascript
        application/json
        application/xml
        image/svg+xml;
    gzip_min_length 1000;

    # Custom 404 page (Zola generates this)
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
